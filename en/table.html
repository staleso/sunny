    <title>Elbilvalg.no - Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #111114;
            --surface: #1c1c1f;
            --surface2: #2a2a2d;
            --text: #f0f0f5;
            --text2: #8e8e93;
            --accent: #0a84ff;
            --border: rgba(255,255,255,0.08);
        }

        html { overflow-x: auto; overflow-y: scroll; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: 16px;
        }

        .header {
            max-width: 1400px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .header-links {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }

        .header-links a:hover { text-decoration: underline; }

        .search-row {
            max-width: 1400px;
            margin: 0 auto 12px;
        }

        .search-row input {
            width: 100%;
            max-width: 400px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .search-row input:focus { border-color: var(--accent); }
        .search-row input::placeholder { color: var(--text2); }

        .table-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            white-space: nowrap;
        }

        thead { position: sticky; top: 0; z-index: 2; }

        th {
            background: var(--surface2);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            cursor: pointer;
            user-select: none;
            border-bottom: 2px solid var(--border);
            position: relative;
        }

        th:hover { color: var(--accent); }

        th .sort-arrow {
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.4;
        }

        th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td { background: var(--surface); }

        tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
        tr:nth-child(even):hover td { background: var(--surface2); }

        .col-num { text-align: right; }
        .col-price { text-align: right; font-weight: 600; }
        .col-make { font-weight: 600; }

        .count-row {
            max-width: 1400px;
            margin: 8px auto 0;
            font-size: 12px;
            color: var(--text2);
        }

        @media (max-width: 768px) {
            body { padding: 8px; }
            table { font-size: 12px; }
            th, td { padding: 6px 8px; }
        }
    </style>

</head>
<body>
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;">
        <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <a href="/en/" style="font-size:18px;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-0.03em;">Elbilvalg.no</a>
            <a href="/tabell.html" style="font-size:12px;color:var(--text2);text-decoration:none;margin-left:8px;">NO</a>
            <button onclick="toggleTheme()" aria-label="Toggle theme" style="background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;">
                <svg id="t-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
        <div style="max-width:1400px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;">
            <a href="/en/" style="padding:6px 14px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;border-radius:8px;">Cars</a>
            <a href="/en/quiz.html" style="padding:6px 14px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;border-radius:8px;">Quiz</a>
            <a href="/en/calculator.html" style="padding:6px 14px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;border-radius:8px;">Calc</a>
            <a href="/en/table.html" style="padding:6px 14px;font-size:13px;font-weight:500;color:var(--accent);text-decoration:none;border-radius:8px;background:rgba(37,99,235,0.08);">Table</a>

    <script>
    function toggleTheme(){var d=document.documentElement,t=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',t);localStorage.setItem('theme',t);}
    </script>
    <div class="search-row">
        <input type="text" id="search" placeholder="Search by make, model..." autocomplete="off">
    </div>
    <div class="table-wrapper">
        <table id="car-table">
            <thead>
                <tr id="table-head"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <div class="count-row" id="count-row"></div>

    <script src="../app-en.js?v=20260507"></script>
    <script>
    (function() {
        const columns = [
            { key: "make", label: "Make", cls: "col-make" },
            { key: "model", label: "Model" },
            { key: "country", label: "Country", format: function(v, car) { return car ? getCarCountryFlag(car) : "—"; } },
            { key: "year", label: "Year", cls: "col-num" },
            { key: "price", label: "Price (NOK)", cls: "col-price", format: v => v ? v.toLocaleString("en") : "—" },
            { key: "type", label: "Type" },
            { key: "segment", label: "Segment" },
            { key: "hp", label: "HP", cls: "col-num" },
            { key: "kwh", label: "kWh", cls: "col-num" },
            { key: "range", label: "Range", cls: "col-num", format: v => v ? v + " km" : "—" },
            { key: "zeroToHundred", label: "0-100", cls: "col-num", format: v => v ? v + "s" : "—" },
            { key: "drivetrain", label: "Drivetrain" },
            { key: "seats", label: "Seats", cls: "col-num" },
            { key: "trunk", label: "Trunk", cls: "col-num", format: v => v ? v + " L" : "—" },
            { key: "length", label: "Length", cls: "col-num", format: v => v ? v + " mm" : "—" },
            { key: "width", label: "Width", cls: "col-num", format: v => v ? v + " mm" : "—" },
            { key: "height", label: "Height", cls: "col-num", format: v => v ? v + " mm" : "—" },
            { key: "weight", label: "Weight", cls: "col-num", format: v => v ? v.toLocaleString("en") + " kg" : "—" },
        ];

        let sortKey = "price";
        let sortAsc = true;
        let searchTerm = "";

        function buildHead() {
            const tr = document.getElementById("table-head");
            tr.innerHTML = columns.map(col => {
                const isSorted = col.key === sortKey;
                const arrow = isSorted ? (sortAsc ? "▲" : "▼") : "▲";
                return `<th class="${isSorted ? 'sorted' : ''}" data-key="${col.key}">
                    ${col.label}<span class="sort-arrow">${arrow}</span>
                </th>`;
            }).join("");

            tr.querySelectorAll("th").forEach(th => {
                th.addEventListener("click", () => {
                    const key = th.dataset.key;
                    if (sortKey === key) {
                        sortAsc = !sortAsc;
                    } else {
                        sortKey = key;
                        sortAsc = true;
                    }
                    buildHead();
                    renderRows();
                });
            });
        }

        function getFilteredSorted() {
            let cars = [...CARS];
            if (searchTerm) {
                const q = searchTerm.toLowerCase();
                cars = cars.filter(c =>
                    (c.make + " " + c.model + " " + c.segment + " " + c.type + " " + c.drivetrain + " " + getCarCountry(c))
                        .toLowerCase().includes(q)
                );
            }
            cars.sort((a, b) => {
                let va = sortKey === "country" ? getCarCountry(a) : a[sortKey];
                let vb = sortKey === "country" ? getCarCountry(b) : b[sortKey];
                if (va == null) va = "";
                if (vb == null) vb = "";
                if (typeof va === "string") {
                    return sortAsc ? va.localeCompare(vb, "en") : vb.localeCompare(va, "en");
                }
                return sortAsc ? va - vb : vb - va;
            });
            return cars;
        }

        function renderRows() {
            const cars = getFilteredSorted();
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = cars.map(car => {
                return "<tr>" + columns.map(col => {
                    const val = car[col.key];
                    const display = col.format ? col.format(val, car) : (val != null ? val : "—");
                    return `<td class="${col.cls || ''}">${display}</td>`;
                }).join("") + "</tr>";
            }).join("");
            document.getElementById("count-row").textContent = cars.length + " cars";
        }

        document.getElementById("search").addEventListener("input", e => {
            searchTerm = e.target.value;
            renderRows();
        });

        buildHead();
        renderRows();
    })();
    </script>
</body>
</html>
