    <div id="quiz-page">
        <div class="quiz-container">
            <header class="quiz-header">
                <h1>Find Your EV</h1>
                <p class="quiz-intro">5 simple questions – we'll suggest the 3 best cars for you.</p>
            </header>

            <div class="quiz-progress">
                <div class="quiz-progress-bar" id="progress-bar"></div>
            </div>

            <div id="quiz-content"></div>
        </div>
    </div>

    <script src="../app-en.js?v=20260507"></script>
    <script>
    (function() {
    const QUESTIONS = [
        {
            id: 'budget',
            title: 'What is your budget?',
            help: 'Approximate new car price incl. tax.',
            options: [
                { label: 'Under 300 000 kr', value: 300000 },
                { label: '300 – 500 000 kr', value: 500000 },
                { label: '500 – 800 000 kr', value: 800000 },
                { label: 'Over 800 000 kr', value: 9999999 }
            ]
        },
        {
            id: 'family',
            title: 'How many people should the car seat?',
            help: 'Think about daily use, not maximum capacity.',
            options: [
                { label: '1–2 people', value: 2 },
                { label: '3–4 people', value: 4 },
                { label: '5 people', value: 5 },
                { label: '6–7 people', value: 7 }
            ]
        },
        {
            id: 'usage',
            title: 'What will the car mainly be used for?',
            help: 'Choose the most important use.',
            options: [
                { label: 'Short commute (under 50 km/day)', value: 'city' },
                { label: 'Mixed driving (50–150 km/day)', value: 'mixed' },
                { label: 'Long trips / cabin trips (200+ km)', value: 'long' },
                { label: 'Highway commuting year-round', value: 'highway' }
            ]
        },
        {
            id: 'trailer',
            title: 'Do you need to tow a trailer or boat?',
            help: 'Braked trailer weight.',
            options: [
                { label: 'No, not necessary', value: 0 },
                { label: 'Small trailer (up to 750 kg)', value: 750 },
                { label: 'Medium (up to 1,500 kg)', value: 1500 },
                { label: 'Boat / large trailer (1,800+ kg)', value: 1800 }
            ]
        },
        {
            id: 'priority',
            title: 'What matters most to you?',
            help: "We'll weight the recommendations accordingly.",
            options: [
                { label: 'Lowest possible price', value: 'price' },
                { label: 'Longest range', value: 'range' },
                { label: 'Fastest charging', value: 'charging' },
                { label: 'Most performance and wow factor', value: 'performance' },
                { label: 'Best value for money', value: 'balance' }
            ]
        }
    ];

    const quizState = { step: 0, answers: {} };

    function renderStep() {
        const content = document.getElementById('quiz-content');
        const bar = document.getElementById('progress-bar');

        if (quizState.step >= QUESTIONS.length) {
            bar.style.width = '100%';
            renderResults();
            return;
        }

        const q = QUESTIONS[quizState.step];
        bar.style.width = ((quizState.step / QUESTIONS.length) * 100) + '%';

        const optsHtml = q.options.map((opt) => {
            const valAttr = typeof opt.value === 'string'
                ? "'" + opt.value.replace(/'/g, "\\'") + "'"
                : opt.value;
            return '<button class="quiz-option" onclick="quizAnswer(\'' + q.id + '\', ' + valAttr + ')">' + opt.label + '</button>';
        }).join('');

        content.innerHTML =
            '<div class="quiz-step">' +
                '<div class="quiz-step-num">Question ' + (quizState.step + 1) + ' of ' + QUESTIONS.length + '</div>' +
                '<h2 class="quiz-question">' + q.title + '</h2>' +
                '<p class="quiz-help">' + q.help + '</p>' +
                '<div class="quiz-options">' + optsHtml + '</div>' +
                (quizState.step > 0 ? '<button class="quiz-back" onclick="quizBack()">← Back</button>' : '') +
            '</div>';
    }

    function answer(id, value) {
        quizState.answers[id] = value;
        quizState.step++;
        if (typeof trackEvent === 'function') trackEvent('quiz_answer', { question: id, value: String(value), step: quizState.step });
        renderStep();
    }

    function goBack() {
        if (quizState.step > 0) quizState.step--;
        renderStep();
    }

    function scoreCar(car, a) {
        let score = 0;
        if (car.price <= a.budget) score += 20;
        else if (car.price <= a.budget * 1.15) score += 5;
        else return -1000;

        if (car.seats >= a.family) score += 15;
        else score -= 20;

        const winterRange = (typeof getWinterRange === 'function') ? getWinterRange(car) : Math.round(car.range * 0.65);
        const chargeSpeed = (typeof getChargeSpeed === 'function') ? getChargeSpeed(car) : 130;

        if (a.usage === 'city' && winterRange >= 180) score += 10;
        else if (a.usage === 'mixed' && winterRange >= 250) score += 15;
        else if (a.usage === 'long' && winterRange >= 320) score += 20;
        else if (a.usage === 'highway' && winterRange >= 300 && chargeSpeed >= 150) score += 25;
        else if ((a.usage === 'long' || a.usage === 'highway') && winterRange < 250) score -= 15;

        if (a.trailer > 0) {
            const braked = (typeof getTrailerBraked === 'function') ? getTrailerBraked(car) : 750;
            if (braked >= a.trailer) score += 15;
            else score -= 25;
        }

        if (a.priority === 'price') score += Math.max(0, 20 - (car.price / a.budget) * 15);
        if (a.priority === 'range') score += Math.min(25, (car.range - 300) / 20);
        if (a.priority === 'charging') score += Math.min(25, (chargeSpeed - 100) / 8);
        if (a.priority === 'performance') {
            score += Math.min(25, (car.hp - 200) / 20);
            if (car.zeroToHundred && car.zeroToHundred < 5) score += 10;
            else if (car.zeroToHundred && car.zeroToHundred < 6) score += 5;
        }
        if (a.priority === 'balance') {
            const valueScore = (car.range / (car.price / 100000));
            score += Math.min(20, valueScore);
        }
        return score;
    }

    function renderResults() {
        const a = quizState.answers;
        if (typeof trackEvent === 'function') trackEvent('quiz_complete', a);
        if (typeof CARS === 'undefined') {
            document.getElementById('quiz-content').innerHTML =
                '<div class="quiz-results"><h2>Error</h2><p>Could not load car data. <a href="javascript:location.reload()">Try again</a>.</p></div>';
            return;
        }
        const scored = CARS.map(car => ({ car: car, score: scoreCar(car, a) }))
            .filter(x => x.score > -500)
            .sort((x, y) => y.score - x.score);

        const top3 = scored.slice(0, 3);
        const content = document.getElementById('quiz-content');

        if (top3.length === 0) {
            content.innerHTML =
                '<div class="quiz-results">' +
                    '<h2>No matches</h2>' +
                    '<p>We could not find any cars matching all your criteria. <a href="/en/">Browse all cars</a> or <a href="javascript:location.reload()">start over</a>.</p>' +
                '</div>';
            return;
        }

        const cardsHtml = top3.map((r, i) => {
            const car = r.car;
            const bc = (typeof BRAND_COLORS !== 'undefined' && BRAND_COLORS[car.make]) ? BRAND_COLORS[car.make] : { primary: '#888' };
            const initials = (car.make.charAt(0) + car.model.charAt(0)).toUpperCase();
            const slug = (typeof carSlug === 'function') ? carSlug(car) : car.id;
            const priceStr = (typeof formatPrice === 'function') ? formatPrice(car.price) : (car.price + ' kr');
            const kw = (typeof getChargeSpeed === 'function') ? getChargeSpeed(car) : '–';
            return '<a href="bil.html?id=' + slug + '" class="quiz-result-card" onclick="if(typeof trackEvent===\'function\')trackEvent(\'quiz_result_click\', { rank: ' + (i+1) + ', car_id: ' + car.id + ' })">' +
                '<div class="quiz-result-rank">' + (i + 1) + '</div>' +
                '<div class="quiz-result-thumb" style="background:linear-gradient(135deg, ' + bc.primary + '22, ' + bc.primary + '08)">' +
                    '<span>' + initials + '</span>' +
                '</div>' +
                '<div class="quiz-result-info">' +
                    '<div class="quiz-result-title">' + car.make + ' ' + car.model + '</div>' +
                    '<div class="quiz-result-sub">' + car.year + ' · ' + car.segment + '</div>' +
                    '<div class="quiz-result-specs">' +
                        '<span>' + priceStr + '</span>' +
                        '<span>·</span>' +
                        '<span>' + car.range + ' km</span>' +
                        '<span>·</span>' +
                        '<span>' + kw + ' kW</span>' +
                    '</div>' +
                '</div>' +
                '<div class="quiz-result-arrow">→</div>' +
            '</a>';
        }).join('');

        content.innerHTML =
            '<div class="quiz-results">' +
                '<h2>Your top ' + top3.length + ' recommendations</h2>' +
                '<p class="quiz-results-intro">Based on your answers, we have selected the cars that suit you best:</p>' +
                '<div class="quiz-results-list">' + cardsHtml + '</div>' +
                '<div class="quiz-actions">' +
                    '<button class="quiz-restart-btn" onclick="location.reload()">Start over</button>' +
                    '<a class="quiz-browse-btn" href="/en/">See all cars</a>' +
                '</div>' +
                '<div class="quiz-note">The recommendations are indicative and based on the specifications in our database. We evaluate price, range, number of seats, towing capacity, charging speed and your priority.</div>' +
            '</div>';
    }

    // Expose onclick handlers globally
    window.quizAnswer = answer;
    window.quizBack = goBack;

    // Start
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderStep);
    } else {
        renderStep();
    }
    })();
    </script>
