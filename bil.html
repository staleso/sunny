<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f8f8fa">
    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
            if (t === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                var m = document.querySelector('meta[name="theme-color"]');
                if (m) m.content = '#16161e';
            }
        })();
    </script>
    <meta property="og:type" content="website">
    <meta property="og:locale" content="nb_NO">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=33">
    <meta name="google-adsense-account" content="ca-pub-4678480487049419">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4678480487049419" crossorigin="anonymous"></script>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3TDS5SGX53"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        var _cc = localStorage.getItem('cookie-consent');
        if (_cc === 'accepted') {
            gtag('consent', 'default', { analytics_storage: 'granted', ad_storage: 'granted', ad_personalization: 'granted', ad_user_data: 'granted' });
        } else {
            gtag('consent', 'default', { analytics_storage: 'denied', ad_storage: 'denied', ad_personalization: 'denied', ad_user_data: 'denied' });

    <title>Laster...</title>
</head>
<body>
    <div id="car-detail-page">
        <nav class="detail-nav">
            <a href="/" class="back-link">&larr; Alle biler</a>
        </nav>
        <div id="detail-content">
            <p class="detail-loading">Laster bildata...</p>
        </div>
    </div>

    <script src="app.js?v=31"></script>
    <script>
    (function() {
        function addNoIndex() {
            var m = document.createElement('meta');
            m.name = 'robots';
            m.content = 'noindex, follow';
            document.head.appendChild(m);
        }
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('id');
        if (!slug) {
            addNoIndex();
            document.title = 'Velg en elbil | Elbilvalg.no';
            document.getElementById('detail-content').innerHTML = '<p class="detail-loading">Ingen bil valgt. <a href="/">Se alle elbiler</a></p>';
            return;
        }

        // Find car by slug
        function makeSlug(car) {
            return (car.make + '-' + car.model + '-' + car.year)
                .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        }
        const car = CARS.find(c => makeSlug(c) === slug);
        if (!car) {
            addNoIndex();
            document.title = 'Bil ikke funnet | Elbilvalg.no';
            document.getElementById('detail-content').innerHTML = '<p class="detail-loading">Fant ikke bilen. <a href="/">Gå tilbake</a></p>';
            return;
        }

        // Add canonical for this specific car page
        var canonical = document.createElement('link');
        canonical.rel = 'canonical';
        canonical.href = 'https://elbilvalg.no/bil.html?id=' + slug;
        document.head.appendChild(canonical);

        // Track recent view + GA4
        if (typeof addRecentlyViewed === 'function') addRecentlyViewed(car.id);
        if (typeof trackEvent === 'function') trackEvent('car_view', { car_id: car.id, car_make: car.make, car_model: car.model });

        // Set page title and meta
        document.title = car.make + ' ' + car.model + ' ' + car.year + ' – Pris, rekkevidde, spesifikasjoner | Elbilvalg.no';
        var meta = document.createElement('meta');
        meta.name = 'description';
        meta.content = car.make + ' ' + car.model + ' ' + car.year + ': Pris ' + formatPrice(car.price) + ', rekkevidde ' + car.range + ' km, ' + car.hp + ' hk, 0-100 på ' + car.zeroToHundred + 's. Se alle spesifikasjoner.';
        document.head.appendChild(meta);

        var og = document.createElement('meta');
        og.setAttribute('property', 'og:title');
        og.content = car.make + ' ' + car.model + ' ' + car.year + ' | Elbilvalg.no';
        document.head.appendChild(og);

        var src = typeof BRAND_SOURCES !== 'undefined' ? BRAND_SOURCES[car.make] : null;
        var efficiency = (car.kwh / car.range * 100).toFixed(1);

        // News links
        var newsHtml = '';
        if (typeof NEWS_SITES !== 'undefined') {
            var query = encodeURIComponent(car.make + ' ' + car.model);
            newsHtml = NEWS_SITES.map(function(site) {
                return '<a href="' + site.searchUrl + query + '" target="_blank" rel="noopener" class="news-link">' + site.name + '</a>';
            }).join('');
        }

        // Stars
        var starsHtml = typeof renderStars === 'function' ? renderStars(car.id, 24, true) : '';

        // Placeholder image (brand name in elegant typography)
        var bc = (typeof BRAND_COLORS !== 'undefined' && BRAND_COLORS[car.make]) || { primary: '#888' };
        var imgHtml = '<div class="detail-image"><div class="car-img-placeholder" style="background:linear-gradient(135deg, ' + bc.primary + '1f, ' + bc.primary + '05)"><span class="car-img-placeholder-text" style="color:' + bc.primary + '">' + car.make + '</span></div></div>';

        document.getElementById('detail-content').innerHTML = ''
            + imgHtml
            + '<header class="detail-header">'
            + '  <div class="detail-title-row">'
            + '    <div>'
            + '      <h1 class="detail-title">' + car.make + ' ' + car.model + '</h1>'
            + '      <p class="detail-subtitle">' + car.year + ' · ' + car.segment + ' · ' + car.drivetrain + '</p>'
            + '    </div>'
            + '    <div class="detail-price">' + formatPrice(car.price) + '</div>'
            + '  </div>'
            + (src ? '  <a href="' + src.url + '" target="_blank" rel="noopener" class="detail-source">Kilde: ' + src.name + '</a>' : '')
            + '</header>'

            + (function() {
                var desc = (typeof getCarDescription === 'function') ? getCarDescription(car) : null;
                if (!desc) return '';
                var clean = desc.replace(/\s*\(Tekst: AI-generert\)\s*$/, '');
                return '<section class="detail-section detail-description" data-ai-generated="true">'
                    + '  <span class="ai-label">AI-generert tekst</span>'
                    + '  <p>' + clean + '</p>'
                    + '</section>';
            })()

            + '<table class="detail-table">'
            + '  <tbody>'
            + '    <tr class="detail-table-section"><th colspan="2">Nøkkeltall</th></tr>'
            + '    <tr><td class="detail-table-label">Rekkevidde (WLTP)</td><td class="detail-table-val">' + car.range + ' km</td></tr>'
            + '    <tr><td class="detail-table-label">DC-lading</td><td class="detail-table-val">' + getChargeSpeed(car) + ' kW</td></tr>'
            + '    <tr><td class="detail-table-label">Effekt</td><td class="detail-table-val">' + car.hp + ' hk</td></tr>'
            + '    <tr><td class="detail-table-label">0–100 km/t</td><td class="detail-table-val">' + car.zeroToHundred + ' s</td></tr>'
            + '    <tr><td class="detail-table-label">Batteri</td><td class="detail-table-val">' + car.kwh + ' kWh</td></tr>'

            + '    <tr class="detail-table-section"><th colspan="2">Lading</th></tr>'
            + '    <tr><td class="detail-table-label">Maks DC-lading</td><td class="detail-table-val">~' + getChargeSpeed(car) + ' kW</td></tr>'
            + '    <tr><td class="detail-table-label">Lading 10–80%</td><td class="detail-table-val">~' + getChargeTime10to80(car) + ' min</td></tr>'
            + '    <tr><td class="detail-table-label">Varmepumpe</td><td class="detail-table-val">' + (hasHeatPump(car) ? '<span class="badge-yes">Ja</span>' : '<span class="badge-no">Nei</span>') + '</td></tr>'
            + '    <tr><td class="detail-table-label">Vinterrekkevidde (est.)</td><td class="detail-table-val">~' + getWinterRange(car) + ' km</td></tr>'
            + '    <tr class="detail-note-row"><td colspan="2">Vinterestimat: sommerrekkevidde × 0,65. Faktisk forbruk avhenger av temperatur, kjørestil og dekk.</td></tr>'

            + '    <tr class="detail-table-section"><th colspan="2">Tilhenger</th></tr>'
            + '    <tr><td class="detail-table-label">Tilhenger m/brems</td><td class="detail-table-val">~' + getTrailerBraked(car) + ' kg</td></tr>'
            + '    <tr><td class="detail-table-label">Tilhenger u/brems</td><td class="detail-table-val">~' + getTrailerUnbraked(car) + ' kg</td></tr>'

            + '    <tr class="detail-table-section"><th colspan="2">Detaljer</th></tr>'
            + '    <tr><td class="detail-table-label">Drivlinje</td><td class="detail-table-val">' + car.drivetrain + '</td></tr>'
            + '    <tr><td class="detail-table-label">Seter</td><td class="detail-table-val">' + car.seats + '</td></tr>'
            + '    <tr><td class="detail-table-label">Bagasjerom</td><td class="detail-table-val">' + (car.trunk ? car.trunk + ' liter' : '—') + '</td></tr>'
            + '    <tr><td class="detail-table-label">Forbruk</td><td class="detail-table-val">' + efficiency + ' kWh/100km</td></tr>'
            + '    <tr><td class="detail-table-label">Batteri</td><td class="detail-table-val">' + car.battery + '</td></tr>'
            + '    <tr><td class="detail-table-label">Type</td><td class="detail-table-val">' + car.segment + '</td></tr>'

            + '    <tr class="detail-table-section"><th colspan="2">Dimensjoner</th></tr>'
            + '    <tr><td class="detail-table-label">Lengde</td><td class="detail-table-val">' + car.length + ' mm</td></tr>'
            + '    <tr><td class="detail-table-label">Bredde</td><td class="detail-table-val">' + car.width + ' mm</td></tr>'
            + '    <tr><td class="detail-table-label">Høyde</td><td class="detail-table-val">' + car.height + ' mm</td></tr>'
            + '    <tr><td class="detail-table-label">Vekt</td><td class="detail-table-val">' + car.weight + ' kg</td></tr>'
            + '  </tbody>'
            + '</table>'

            + '<section class="detail-section">'
            + '  <h2>Nyheter og tester</h2>'
            + '  <div class="detail-news">' + newsHtml + '</div>'
            + '</section>'

            + '<section class="detail-section">'
            + '  <h2>Vurdering</h2>'
            + '  <div class="detail-rating">' + starsHtml + '</div>'
            + '</section>'

            + '<section class="detail-section" id="comments-section" data-car-id="' + car.id + '">'
            + '  <h2>Kommentarer <span class="comments-count" id="comments-count"></span></h2>'
            + '  <div id="comments-list" class="comments-list"><p class="comments-loading">Laster kommentarer…</p></div>'
            + '  <form id="comment-form" class="comment-form" autocomplete="off">'
            + '    <input type="text" id="comment-name" class="comment-name" placeholder="Navn (la stå tomt for anonym)" maxlength="40">'
            + '    <textarea id="comment-text" class="comment-text" placeholder="Skriv en kommentar…" maxlength="1000" rows="3" required></textarea>'
            + '    <div class="comment-form-foot">'
            + '      <span class="comment-count-hint" id="comment-count-hint">0 / 1000</span>'
            + '      <button type="submit" class="comment-submit">Send</button>'
            + '    </div>'
            + '  </form>'
            + '</section>'

            + '<div class="detail-actions">'
            + '  <button class="detail-btn detail-btn-primary" onclick="toggleCompare(' + car.id + '); location.reload();">'
            + (isInCompare(car.id) ? '&#10003; Fjern fra sammenligning' : '+ Legg til sammenligning')
            + '  </button>'
            + '</div>'

            + '<div class="detail-disclaimer">'
            + '  Informasjonen er veiledende og kan inneholde feil. Priser og spesifikasjoner kan avvike fra faktiske verdier. Kontakt alltid forhandler for bekreftede opplysninger. Beskrivende tekster på denne siden er AI-generert og redaksjonelt gjennomgått.'
            + '  <div class="footer-links"><a href="/om-oss.html">Om oss</a><a href="/personvern.html">Personvernerklæring</a></div>'
            + '</div>'

            + '<div class="detail-ad">'
            + '  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4678480487049419" data-ad-slot="2454031921" data-ad-format="auto" data-full-width-responsive="true"></ins>'
            + '</div>';

        try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
    })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, addDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAxAbS7ohSJqcKHsRmsygGPfX36D2Upkqk",
            authDomain: "elbilvalg.firebaseapp.com",
            projectId: "elbilvalg",
            storageBucket: "elbilvalg.firebasestorage.app",
            messagingSenderId: "750901005322",
            appId: "1:750901005322:web:1ed67fab732ff2402723f3",
            measurementId: "G-T0R0LD2FPC"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        async function hashIP(ip) {
            const data = new TextEncoder().encode(ip);
            const buf = await crypto.subtle.digest("SHA-256", data);
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
        }
        async function getIP() {
            try { const r = await fetch("https://api.ipify.org?format=json"); const d = await r.json(); return d.ip; } catch { return "unknown"; }
        }
        async function loadRatings() {
            const snap = await getDocs(collection(db, "ratings"));
            const ratings = {};
            snap.forEach(d => { ratings[d.id] = d.data(); });
            window._fbRatings = ratings;
        }
        window._fbSaveRating = async function(carId, rating) {
            const key = String(carId);
            const ref = doc(db, "ratings", key);
            const snap = await getDoc(ref);
            const data = snap.exists() ? snap.data() : { votes: {} };
            data.votes[window._fbIPHash] = rating;
            await setDoc(ref, data);
            window._fbRatings[key] = data;
        };

        // ===== Admin state =====
        let isAdmin = false;
        onAuthStateChanged(auth, (user) => {
            isAdmin = !!user;
            document.body.classList.toggle("is-admin", isAdmin);
            renderAdminBar();
            if (document.getElementById("comments-list")) loadComments();
        });

        function renderAdminBar() {
            let bar = document.getElementById("admin-bar");
            if (!isAdmin) { if (bar) bar.remove(); return; }
            if (!bar) {
                bar = document.createElement("div");
                bar.id = "admin-bar";
                bar.className = "admin-bar";
                document.body.appendChild(bar);
            }
            bar.innerHTML = '<span class="admin-badge">Admin</span>' +
                '<span class="admin-email">' + (auth.currentUser && auth.currentUser.email || '') + '</span>' +
                '<button class="admin-logout" id="admin-logout">Logg ut</button>';
            document.getElementById("admin-logout").onclick = () => signOut(auth);
        }

        function showAdminLogin() {
            if (document.getElementById("admin-modal")) return;
            const m = document.createElement("div");
            m.id = "admin-modal";
            m.className = "admin-modal";
            m.innerHTML =
                '<div class="admin-modal-content">' +
                    '<h3>Admin-innlogging</h3>' +
                    '<input type="email" id="admin-email" placeholder="E-post" autocomplete="username">' +
                    '<input type="password" id="admin-password" placeholder="Passord" autocomplete="current-password">' +
                    '<div class="admin-modal-err" id="admin-err"></div>' +
                    '<div class="admin-modal-actions">' +
                        '<button class="admin-modal-cancel" id="admin-cancel">Avbryt</button>' +
                        '<button class="admin-modal-submit" id="admin-submit">Logg inn</button>' +
                    '</div>' +
                '</div>';
            document.body.appendChild(m);
            document.getElementById("admin-cancel").onclick = () => { m.remove(); history.replaceState(null, "", location.pathname + location.search); };
            document.getElementById("admin-submit").onclick = async () => {
                const email = document.getElementById("admin-email").value.trim();
                const pw = document.getElementById("admin-password").value;
                const err = document.getElementById("admin-err");
                err.textContent = "";
                try {
                    await signInWithEmailAndPassword(auth, email, pw);
                    m.remove();
                    history.replaceState(null, "", location.pathname + location.search);
                } catch (e) {
                    err.textContent = "Feil e-post eller passord.";
                }
            };
        }

        if (location.hash === "#admin") showAdminLogin();
        window.addEventListener("hashchange", () => { if (location.hash === "#admin") showAdminLogin(); });

        // ===== Comments =====
        function getCarId() {
            const sec = document.getElementById("comments-section");
            return sec ? parseInt(sec.dataset.carId, 10) : null;
        }
        function fmtDate(ms) {
            const d = new Date(ms);
            const now = Date.now();
            const diff = (now - ms) / 1000;
            if (diff < 60) return "nå";
            if (diff < 3600) return Math.floor(diff / 60) + " min siden";
            if (diff < 86400) return Math.floor(diff / 3600) + " t siden";
            if (diff < 7 * 86400) return Math.floor(diff / 86400) + " d siden";
            return d.toLocaleDateString("nb-NO", { day: "numeric", month: "short", year: "numeric" });
        }
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        }

        async function loadComments() {
            const carId = getCarId();
            const listEl = document.getElementById("comments-list");
            const countEl = document.getElementById("comments-count");
            if (carId === null || !listEl) return;
            try {
                const q = query(collection(db, "comments"), where("carId", "==", carId));
                const snap = await getDocs(q);
                const items = [];
                snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                if (countEl) countEl.textContent = items.length ? "(" + items.length + ")" : "";
                if (items.length === 0) {
                    listEl.innerHTML = '<p class="comments-empty">Ingen kommentarer enda. Bli den første!</p>';
                    return;
                }
                listEl.innerHTML = items.map(c => {
                    const name = c.name && c.name.trim() ? escapeHtml(c.name.trim()) : '<em>Anonym</em>';
                    const text = escapeHtml(c.text || "").replace(/\n/g, "<br>");
                    const edited = c.edited ? ' <span class="comment-edited">(redigert)</span>' : '';
                    const adminBtns = isAdmin
                        ? '<div class="comment-admin">' +
                            '<button class="comment-edit" data-id="' + c.id + '">Rediger</button>' +
                            '<button class="comment-delete" data-id="' + c.id + '">Slett</button>' +
                          '</div>'
                        : '';
                    return '<article class="comment" data-id="' + c.id + '">' +
                        '<header class="comment-head">' +
                            '<span class="comment-name">' + name + '</span>' +
                            '<span class="comment-date">' + fmtDate(c.createdAt || 0) + edited + '</span>' +
                        '</header>' +
                        '<div class="comment-body">' + text + '</div>' +
                        adminBtns +
                    '</article>';
                }).join("");
                if (isAdmin) bindAdminButtons();
            } catch (e) {
                listEl.innerHTML = '<p class="comments-error">Kunne ikke laste kommentarer.</p>';
                console.error(e);
            }
        }

        function bindAdminButtons() {
            document.querySelectorAll(".comment-delete").forEach(btn => {
                btn.onclick = async () => {
                    if (!confirm("Slette denne kommentaren?")) return;
                    try {
                        await deleteDoc(doc(db, "comments", btn.dataset.id));
                        loadComments();
                    } catch (e) { alert("Kunne ikke slette: " + e.message); }
                };
            });
            document.querySelectorAll(".comment-edit").forEach(btn => {
                btn.onclick = async () => {
                    const art = btn.closest(".comment");
                    const body = art.querySelector(".comment-body");
                    const current = body.innerText.replace(/\n$/, "");
                    const next = prompt("Rediger kommentar:", current);
                    if (next === null || next === current) return;
                    try {
                        await updateDoc(doc(db, "comments", btn.dataset.id), { text: next, edited: true });
                        loadComments();
                    } catch (e) { alert("Kunne ikke redigere: " + e.message); }
                };
            });
        }

        function bindCommentForm() {
            const form = document.getElementById("comment-form");
            if (!form) return;
            const textEl = document.getElementById("comment-text");
            const hintEl = document.getElementById("comment-count-hint");
            if (textEl && hintEl) {
                const updateHint = () => { hintEl.textContent = textEl.value.length + " / 1000"; };
                textEl.addEventListener("input", updateHint);
                updateHint();
            }
            form.onsubmit = async (e) => {
                e.preventDefault();
                const carId = getCarId();
                if (carId === null) return;
                const name = document.getElementById("comment-name").value.trim().slice(0, 40);
                const text = document.getElementById("comment-text").value.trim().slice(0, 1000);
                if (!text) return;
                const btn = form.querySelector(".comment-submit");
                btn.disabled = true; btn.textContent = "Sender…";
                try {
                    await addDoc(collection(db, "comments"), {
                        carId: carId,
                        name: name,
                        text: text,
                        createdAt: Date.now(),
                        edited: false,
                        ipHash: window._fbIPHash || ""
                    });
                    document.getElementById("comment-text").value = "";
                    document.getElementById("comment-name").value = "";
                    if (hintEl) hintEl.textContent = "0 / 1000";
                    if (typeof window.trackEvent === "function") window.trackEvent("comment_add", { car_id: carId });
                    await loadComments();
                } catch (e) {
                    alert("Kunne ikke sende kommentar: " + e.message);
                } finally {
                    btn.disabled = false; btn.textContent = "Send";
                }
            };
        }

        (async () => {
            const ip = await getIP();
            window._fbIPHash = await hashIP(ip);
            await loadRatings();
            window._fbReady = true;
            // Re-render stars
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('id');
            if (slug && typeof CARS !== 'undefined') {
                function makeSlug(car) {
                    return (car.make + '-' + car.model + '-' + car.year).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
                }
                const car = CARS.find(c => makeSlug(c) === slug);
                if (car) {
                    const ratingEl = document.querySelector('.detail-rating');
                    if (ratingEl && typeof renderStars === 'function') {
                        ratingEl.innerHTML = renderStars(car.id, 24, true);
                    }
                }
            }
            // Comments
            bindCommentForm();
            loadComments();
        })();
    </script>
</body>
</html>
