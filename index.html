<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ELbil Norge">
    <meta name="theme-color" content="#0a0a0a">
    <title>Elbil Norge - Sammenlign elbiler</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='50'>⚡</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Status bar spacer for iPhone notch -->
        <div class="status-bar-spacer"></div>

        <!-- Header -->
        <header class="app-header">
            <h1>Elbil Norge</h1>
            <p class="subtitle">Sammenlign elbiler i Norge</p>
        </header>

        <!-- Tab Bar -->
        <nav class="tab-bar">
            <button class="tab active" data-tab="browse">Utforsk</button>
            <button class="tab" data-tab="compare">Sammenlign <span class="badge" id="compare-count" style="display:none">0</span></button>
            <button class="tab" data-tab="favorites">Favoritter</button>
        </nav>

        <!-- Browse Tab -->
        <section id="browse-tab" class="tab-content active">
            <!-- Search & Filter -->
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Søk etter elbiler..." autocomplete="off">
            </div>
            <div class="filter-row">
                <select id="filter-brand">
                    <option value="all">Merke</option>
                    <option value="Audi">Audi</option>
                    <option value="BMW">BMW</option>
                    <option value="BYD">BYD</option>
                    <option value="Cupra">Cupra</option>
                    <option value="Ford">Ford</option>
                    <option value="Hyundai">Hyundai</option>
                    <option value="Kia">Kia</option>
                    <option value="Mercedes">Mercedes</option>
                    <option value="NIO">NIO</option>
                    <option value="Polestar">Polestar</option>
                    <option value="Porsche">Porsche</option>
                    <option value="Renault">Renault</option>
                    <option value="Skoda">Skoda</option>
                    <option value="Smart">Smart</option>
                    <option value="Tesla">Tesla</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Volkswagen">Volkswagen</option>
                    <option value="Volvo">Volvo</option>
                    <option value="Xpeng">Xpeng</option>
                </select>
                <select id="filter-type">
                    <option value="all">Type</option>
                    <option value="suv">SUV</option>
                    <option value="sedan">Sedan</option>
                    <option value="hatchback">Hatchback</option>
                    <option value="wagon">Stasjonsvogn</option>
                    <option value="van">Flerbruksbil</option>
                </select>
                <select id="filter-sort">
                    <option value="name">A-Å</option>
                    <option value="price-low">Pris ↑</option>
                    <option value="price-high">Pris ↓</option>
                    <option value="range">Rekkevidde</option>
                    <option value="hp">Effekt</option>
                    <option value="fast">0-100</option>
                    <option value="rating">Vurdering</option>
                </select>
            </div>
            <div id="car-list" class="car-list"></div>
        </section>

        <!-- Compare Tab -->
        <section id="compare-tab" class="tab-content">
            <div id="compare-empty" class="empty-state">
                <div class="empty-icon">⚖️</div>
                <p>Legg til biler for sammenligning</p>
                <span class="empty-hint">Trykk + på en bil under Utforsk</span>
            </div>
            <div id="compare-view" style="display:none">
                <div class="compare-header-row" id="compare-header-row"></div>
                <div class="compare-table" id="compare-table"></div>
            </div>
        </section>

        <!-- Favorites Tab -->
        <section id="favorites-tab" class="tab-content">
            <div id="favorites-empty" class="empty-state">
                <div class="empty-icon">❤️</div>
                <p>Ingen favoritter ennå</p>
                <span class="empty-hint">Trykk på hjertet for å lagre en bil</span>
            </div>
            <div id="favorites-list" class="car-list"></div>
        </section>

        <!-- Car Detail Modal -->
        <div id="car-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="modal-close" id="modal-close">✕</button>
                    <div class="modal-car-image" id="modal-image"></div>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
