    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
            if (t === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                var m = document.querySelector('meta[name="theme-color"]');
                if (m) m.content = '#16161e';
            }
        })();
    </script>

    <style>
        html { overflow-x: auto; overflow-y: scroll; }
        .search-row, .table-wrapper, .count-row { padding-left: 16px; padding-right: 16px; }

        .search-row {
            max-width: 1400px;
            margin: 0 auto 12px;
        }

        .search-row input {
            width: 100%;
            max-width: 400px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .search-row input:focus { border-color: var(--accent); }
        .search-row input::placeholder { color: var(--text2); }

        .table-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            white-space: nowrap;
        }

        thead { position: sticky; top: 0; z-index: 2; }

        th {
            background: var(--surface2);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            cursor: pointer;
            user-select: none;
            border-bottom: 2px solid var(--border);
            position: relative;
        }

        th:hover { color: var(--accent); }

        th .sort-arrow {
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.4;
        }

        th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td { background: var(--surface); }

        tr:nth-child(even) td { background: rgba(128,128,128,0.04); }
        tr:nth-child(even):hover td { background: var(--surface2); }

        .col-num { text-align: right; }
        .col-price { text-align: right; font-weight: 600; }
        .col-make { font-weight: 600; }

        .count-row {
            max-width: 1400px;
            margin: 8px auto 0;
            font-size: 12px;
            color: var(--text2);
        }

        @media (max-width: 768px) {
            table { font-size: 12px; }
            th, td { padding: 6px 8px; }
        }
    </style>

    <script>
    function toggleTheme(){var d=document.documentElement,t=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',t);localStorage.setItem('theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=t==='dark'?'#16161e':'#f8f8fa';}
    </script>
    <div class="search-row">
        <input type="text" id="search" placeholder="Søk etter merke, modell..." autocomplete="off">
    </div>
    <div class="table-wrapper">
        <table id="car-table">
            <thead>
                <tr id="table-head"></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <div class="count-row" id="count-row"></div>

    <script src="app.js?v=20260507"></script>
    <script>
    (function() {
        const columns = [
            { key: "make", label: "Merke", cls: "col-make" },
            { key: "model", label: "Modell" },
            { key: "country", label: "Land", format: function(v, car) { return car ? getCarCountryFlag(car) : "—"; } },
            { key: "year", label: "År", cls: "col-num" },
            { key: "price", label: "Pris (NOK)", cls: "col-price", format: v => v ? v.toLocaleString("nb-NO") : "—" },
            { key: "type", label: "Type" },
            { key: "segment", label: "Segment" },
            { key: "hp", label: "HK", cls: "col-num" },
            { key: "kwh", label: "kWh", cls: "col-num" },
            { key: "range", label: "Rekkevidde", cls: "col-num", format: v => v ? v + " km" : "—" },
            { key: "zeroToHundred", label: "0-100", cls: "col-num", format: v => v ? v + "s" : "—" },
            { key: "drivetrain", label: "Drivlinje" },
            { key: "seats", label: "Seter", cls: "col-num" },
            { key: "trunk", label: "Bagasje", cls: "col-num", format: v => v ? v + " L" : "—" },
            { key: "length", label: "Lengde", cls: "col-num", format: v => v ? v + " mm" : "—" },
            { key: "width", label: "Bredde", cls: "col-num", format: v => v ? v + " mm" : "—" },
            { key: "height", label: "Høyde", cls: "col-num", format: v => v ? v + " mm" : "—" },
            { key: "weight", label: "Vekt", cls: "col-num", format: v => v ? v.toLocaleString("nb-NO") + " kg" : "—" },
            { key: "groundClearance", label: "Bakkekl.", cls: "col-num", format: v => v ? v + " mm" : "—" },
        ];

        let sortKey = "price";
        let sortAsc = true;
        let searchTerm = "";

        function buildHead() {
            const tr = document.getElementById("table-head");
            tr.innerHTML = columns.map(col => {
                const isSorted = col.key === sortKey;
                const arrow = isSorted ? (sortAsc ? "▲" : "▼") : "▲";
                return `<th class="${isSorted ? 'sorted' : ''}" data-key="${col.key}">
                    ${col.label}<span class="sort-arrow">${arrow}</span>
                </th>`;
            }).join("");

            tr.querySelectorAll("th").forEach(th => {
                th.addEventListener("click", () => {
                    const key = th.dataset.key;
                    if (sortKey === key) {
                        sortAsc = !sortAsc;
                    } else {
                        sortKey = key;
                        sortAsc = true;
                    }
                    buildHead();
                    renderRows();
                });
            });
        }

        function getFilteredSorted() {
            let cars = [...CARS];
            if (searchTerm) {
                const q = searchTerm.toLowerCase();
                cars = cars.filter(c =>
                    (c.make + " " + c.model + " " + c.segment + " " + c.type + " " + c.drivetrain + " " + getCarCountry(c))
                        .toLowerCase().includes(q)
                );
            }
            cars.sort((a, b) => {
                let va = sortKey === "country" ? getCarCountry(a) : a[sortKey];
                let vb = sortKey === "country" ? getCarCountry(b) : b[sortKey];
                if (va == null) va = "";
                if (vb == null) vb = "";
                if (typeof va === "string") {
                    return sortAsc ? va.localeCompare(vb, "nb") : vb.localeCompare(va, "nb");
                }
                return sortAsc ? va - vb : vb - va;
            });
            return cars;
        }

        function renderRows() {
            const cars = getFilteredSorted();
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = cars.map(car => {
                return "<tr>" + columns.map(col => {
                    const val = car[col.key];
                    const display = col.format ? col.format(val, car) : (val != null ? val : "—");
                    return `<td class="${col.cls || ''}">${display}</td>`;
                }).join("") + "</tr>";
            }).join("");
            document.getElementById("count-row").textContent = cars.length + " biler";
        }

        document.getElementById("search").addEventListener("input", e => {
            searchTerm = e.target.value;
            renderRows();
        });

        buildHead();
        renderRows();
    })();
    </script>
</body>
</html>
